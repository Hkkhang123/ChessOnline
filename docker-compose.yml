version: '3.8'

services:
  backend:
    build: ./backend
    container_name: chess_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: chess_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Giữ nguyên node_modules nội bộ container không bị đè bởi máy thật
    environment:
      - NODE_ENV=development
    restart: always
    depends_on:
      - backend